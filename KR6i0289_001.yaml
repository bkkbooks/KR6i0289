body:
  text: 隋天竺三藏闍那崛多譯復次婆伽婆遊於王舍鷲聚山中與大比丘衆五百人俱菩薩九萬二千所謂莊嚴瑩飾菩薩摩訶薩師子遊步菩薩摩訶薩無礙焰淨光德威王菩薩摩訶薩迷留山頂音王菩薩摩訶薩愛笑無垢光菩薩摩訶薩出光蔽日月光菩薩摩訶薩最勝無垢持冠菩薩摩訶薩出威蓮華開身菩薩摩訶薩梵自在音菩薩摩訶薩象戲師子王意菩薩摩訶薩金光淨無垢威菩薩摩訶薩柔軟觸身菩薩摩訶薩金莊嚴相開身菩薩摩訶薩百光休摩羅力菩薩摩訶薩寂根威儀寂行菩薩摩訶薩地最上王菩薩摩訶薩天言辭鳴音菩薩摩訶薩法力自在寂靜遊行菩薩摩訶薩德威無垢身菩薩摩訶薩曼殊尸利菩薩摩訶薩如是等上首九萬二千菩薩爾時師子遊步菩薩摩訶薩見是菩薩等集從坐而起整理衣服一肩郁多羅僧伽作已右膝著地向佛合掌即以歌頌而問佛義無我無命無育法無邊名稱為我宣寂靜極寂常寂然如是此衆最勝者諸見云何是菩提憍慢瞋恚及嫉妬欲體云何是菩提為説導師無邊稱涅槃若無無煩惱行界云何是菩提其體無二佛亦然為我演説大悲者諸法云何畢竟脫涅槃相似解脫同云何當復等虛空無礙無著無處繫迦羅頻伽梵天音無垢光明金光色清淨光音無邊德當為説法畢無塵云何諸蓋等菩提云何欲是菩提體法非法道云何一無垢清淨等虛空若無有數無無數已滅度法云何是菩提若無無著者遍智云何亦復無是作非作無有諍取及不取並無體衆生於中不曾有法中障礙亦復無於中無戒復無忍破戒亦復無一處定之與智如是無無智及智無所得云何是法淨無垢而無所有等虛空心於一時無得處無心云何而是法於中知見無所有無有念修亦無證於中亦復無所斷衆生云何空界同於中法體是一行於中無生亦無轉發起及生無所有如是等法勝人説於中無學無羅漢緣覺亦復無所有求菩提者不可得此法無來亦無去於中無住亦無處亦無有去亦無來無來去法復云何如彼須彌住不動於中無想亦無色色體云何是菩提色與菩提無有二如是法體勝人演於中無空無無相無有染著無無著名與無名法云何言道猶如於山響於中無生無惱者於中亦復無無生無有已滅亦無遮諸法云何是一行於中無天亦無龍無緊那羅夜叉等於中泥犁無所有無有所趣及衆生若説導師最勝法若説惡意諸外道此二云何是一行諸字如是皆入一爾時世尊讚師子遊步菩薩摩訶薩言甚善甚善希有善家子汝今所問乃至諸世不能信受諸天等世當住迷惑善家子汝今不須問是因緣善家子初業菩薩於此非地謂空見者無相見者無願見者無生見者無有見者無相貌見者涅槃見者佛陀見者菩提見者善家子初業菩薩前不應説此法何以故諸善根斷必有是處於佛菩提則行非道若墮斷常不知如來以何意義而説此法如是語已師子遊步菩薩摩訶薩復白佛言説婆伽婆説修伽多世尊若有未來菩薩摩訶薩空見者無相見者無願見者無生見者無有見者無相貌見者涅槃見者佛陀見者菩提見者於空無相言説境界染著言説以字為淨言道為勝重於名利彼聞如來説是無名字法已當捨諸見當知諸法是一相道如衆生信如信説法巧方便中彼當善學雖説少欲知足減省而皆不信為淨雖説在衆過惡而信諸法遠離雖讚説獨一無間無雜而亦不信為淨雖讚説發菩提心而亦知心自性菩提雖讚説廣修多羅而信諸法是廣雖讚説於菩薩而信聲聞獨覺及佛無有別異雖讚説陀那而善通達陀那平等雖讚説尸羅而善通達尸羅本性雖讚説羼帝而於盡滅無生法等善通達見雖讚説毗梨耶而善擇諸法不發雖讚説第耶那三摩地三摩撥帝説三摩地出生百千俱致三摩地門而知見本性三摩般那雖讚説般若數千種相而善通達智及無智本性自體善擇諸法説毀欲過不見一法可染説毀瞋過不見一法可惡説毀癡過而信諸法離癡無礙雖為衆生顯説泥犁畜生閻摩世等過惡而亦不見泥犁畜生閻摩世等彼等如衆生信如信説法當信一行所謂信空信無相信無願信無生信無所有信無相貌大德世尊但當説之彼不可思巧方便句於中若諸聲聞獨覺及初乘發行菩薩摩訶薩等皆非其地唯除信深一行菩薩摩訶薩等如是語已世尊復告師子遊步菩薩摩訶薩言善家子彼若然者汝宜善聽正念善思當為演説師子遊步菩薩摩訶薩言如是世尊我當正聞爾時世尊説此伽他若欲當覺妙菩提彼莫分別貪欲過諸法常是貪自性若知是者得勝尊貪瞋及癡不可得亦無已得今得者諸法皆與虛空等若知是者得勝尊見及不見常一行僧非僧二是一等於中無佛無妙法若知是者得世智猶如丈夫於夢中得菩提已教衆生於中無道無衆生如是自性即諸法菩提坐處無可得彼無可得亦無有明無明二是一相若知是者得導師説衆生性是菩提菩提性即諸衆生衆生菩提二不一若知是者得人上猶如丈夫善覺幻彼幻化現無邊種於中所現畢竟無惑亂衆生數非一貪欲瞋恚與幻等諸此煩惱各如幻凡夫皆念我染恚彼癡亂心惡趣行於中無有貪恚癡於中亦無異煩惱幻等法體分別已如是凡夫煩惱然若無煩惱無衆生於中無佛無當有此無生法分別已凡夫念我當作佛既無有佛無佛法衆生亦無一處見若知法體似虛空彼速當作人上者若求菩提彼無覺彼遠菩提如天地若知法體等於幻彼速當作人上者若分別戒彼無戒若見持戒則破戒戒破戒二是一相若知是者作導師猶如丈夫於夢中受用欲事生歡喜癡亂分別想婦女於中婦女常是無破戒持戒如夢性凡夫分別此二種於中無戒無破戒若知是者作導師著名此是凡夫覺以彼不知聲自性若覺此名非是名彼當得於勝妙忍有諸衆生誓作佛以説告於餘人知住言為淨無修行彼即普閉菩提道於威儀中取乖錯喜言重説彼無知不以言淨覺菩提以彼不知法自性雖於空法常顯説而喜鬪諍惡意生何有菩提及佛法乃是説瞋無智者瞋忍二種是一相若知是者不分別衆生自性彼不知生諸過惡是凡智自言衆生我皆愛我作勝尊脫衆生被動彼即生瞋惡以有惡心不與語恆喜鬪諍求他過而復讚説此忍心亦説諸法皆是空意中貢高求錯失於食貪著無智者晝夜思念於欲事彼等來入村邑已説我當脫諸衆生諸衆生中我悲轉我於衆生有利益是類法體雖顯説而著害心常惡意然我未聞亦未見有悲而復有害心各各共作破瘡已而求阿彌多由國恆伽河沙如是有常得毀辱及打罵不能堪忍諸惡事不至彼土人牛王土即非土若能知空土猶如空自性不念土及土功德當至彼土人牛王説我能忍諸惡事我於菩薩教師想然我未聞亦未見教師想所而生惡各各相毀所有行著乞食家及友家説是我所成熟者於中莫令餘人入我能脫汝莫親餘其彼無有清淨行雜閙遊行是無智於菩提利彼未有晝夜如是作三時當禮諸佛及菩薩莫求彼所有錯失如欲行導常修行若見喜於欲事樂彼所錯失亦勿求如此久必當觸證最勝菩提無邊德當漸次學漸次作不可一時佛即成多劫俱致那由多我著鎧甲非今日莫以分別分別欲我觸菩提如欲性無此煩惱當不生若能信此得勝忍觀此諸聲即非聲無字法體便已入如是聲類諸法體當不生欲亦無瞋於欲及瞋觀無生應知此二無有字此二唯可以名轉字若無有於中無若知諸辭即一辭名亦不生本非有我之所説外道説是類法體彼不知説此諸法以聲言而法及聲不可得能入諸法一相道無上勝忍便觸證莫分別忍莫不忍莫分別瞋莫欲渴此等無生常解知當得世親人中勝東西南北諸方中恆伽許沙如是有一一沙顆人民置若所有土多無邊諸寶滿中施最勝無邊百劫過於上若有聞此修多羅如此福德當無數求此菩提出家已彼所我當付此經必速得於最勝忍經無邊門此當説於陀羅尼不難得當得俱致那由經利智辨才彼當得少動多知疾得解即得無邊樂説辨諸佛皆與彼辨才説修多羅寶非一無邊辨説彼當有爾時師子遊步菩薩摩訶薩而白佛言大德世尊説此伽他幾許衆生聞作利益如是語已佛告師子遊步菩薩摩訶薩言善家子見此衆集論不答言我已見婆伽婆我已見修伽多已過算數於此説法集會滿虛空中天龍夜叉乾闥婆阿修羅伽留荼緊那羅摩睺羅伽及餘諸世界中衆生亦皆聞此説法如是語已佛告師子遊步菩薩摩訶薩言善家子説此法時九十八千天子無生法中得忍九十二千夜叉阿耨多羅三藐三菩提心生三十六千龍阿耨多羅三藐三菩提心生五百比丘增上慢意未得得想彼等聞此説五慢法信解諸法一相道已無所受故漏心解脫於彼菩薩數中六十二千菩薩信解諸法無障礙已無生法中得忍何以故善家子此法説中最上善家子如我於作燈如來應正遍知所現前信解諸法一相道已我於彼時然後無生法中得忍善家子若得諸六波羅蜜若復聞此法本稱量一等善家子菩薩摩訶薩因此道故滿足六波羅蜜我如是説何以故善家子若有菩薩恆河沙等劫行施護戒具忍發勤入定修智於此法道以不知故諸有善根還復滅盡善家子汝看提婆達多如是善根具足有三十相彼雖如是善根具足而更斷諸善根遂墮泥犁耶中於此法道以不知故善家子以是因緣當知如諸善根斷者於此法道以不知故善家子於先過去阿僧祇劫復過無數廣大無量不可思不可量過已復過於彼時節有佛出世名迷留上王如來應正遍知明行具足善逝世間解無上士調御丈夫天人教師佛婆伽婆彼如來壽量九十九俱致那由多百千歲彼世界名金焰影其彼佛土皆用金作亦以三乘令衆生涅槃何者為三所謂聲聞乘獨覺乘菩薩乘彼如來第一集會聲聞有八十俱致那由多百千彼皆阿羅漢諸漏已盡應作者作所作已辦棄捨重擔得到自利盡諸有結以平等智得善解脫第二集會比丘有七十俱致那由多百千第三集會比丘有六十俱致那由多百千第四集會比丘有二十五俱致那由多百千又倍上數比丘尼集又倍上數憂波塞迦集又倍上數憂波斯迦集又倍上數諸菩薩集彼諸菩薩具足無生法忍巧出無邊三摩地道得無邊門總持轉不退轉法輪何況初乘發行菩薩於中復有無量無數獨覺乘者善家子於彼時節彼佛有無量無數無算諸聲聞衆善家子彼金焰影世界若樹若柱彼皆七寶所成彼樹出如是聲所謂空聲無相聲無願聲無生聲無所有聲無相貌聲彼出如是等聲於中如是等聲出時彼諸衆生其心解脫彼如來滅度千歲正法住已彼聲亦不復出善家子彼迷留上王如來應正遍知勸請説法比丘名淨善行令其説法爾乃滅度善家子彼時復有説法比丘名善行意其人具足善淨戒聚復得世間五通勝智亦能轉誦毗那耶藏彼比丘復有嚴熾苦行信樂廉儉領衆説教彼安立住處已於中止住彼之徒衆善住戒聚信樂頭多功德及以減省彼比丘亦發勤行而離於菩提心彼有餘菩薩衆亦教以威儀道令其相應見有所得而行教化取諸行無常取諸行苦説諸行無我彼無巧慧於菩薩行亦無善巧彼比丘雖爾而善根具足又彼説法比丘淨善行者善知衆生各各別根彼所有衆不重頭多功德及以減省乃於無所得忍善巧方便善家子爾時説法比丘淨善行者與其徒衆到善行意比丘住處止宿然亦以時數數入村愍衆生故村中食業作已而出彼令多百千家已作淨信彼之徒衆亦善化導到衆生所為其説法令多百千衆生建立阿耨多羅三藐三菩提若善行意所有徒衆喜樂修定不數入村爾時善行意比丘於淨善行説法者及徒衆邊不淨心生而言此是懶墮比丘常數入村即鳴犍遲集比丘衆自作制住汝等一莫入村向淨善行所有徒衆作如是言汝等不善知行不少言語何因汝等數數入村諸佛世尊讚歎許可住阿蘭拏汝等莫到他家汝等應住思惟定樂善家子爾時淨善行比丘所有徒衆於善行意比丘所制言教不順其轉復數入村為成熟衆生故善家子時彼比丘從村出已彼善行意比丘復鳴犍稚集比丘衆作如是言汝等若更入村於此住處不得共住善家子時淨善行説法者護彼比丘故於自徒衆告言汝等一莫入村時彼村中所有衆生是彼比丘所成熟者彼等不見諸比丘故悉懷熱惱善法損減善家子時淨善行説法者彼三月過已從住處出到別住處及共徒衆復入村城國邑王都入已為諸衆生説法善家子時善行意比丘復見淨善行説法者數入村家亦見彼衆本性威儀入他家中彼復唯有不淨心生今此比丘惡戒破戒自身既爾徒衆亦然此禿何有菩提唯是詐誑便告多人作如是言此比丘雜行去菩提遠貴重利養染著他家善家子爾時善行意比丘於他時死然其死時以於彼邊不淨心生作業熟故墮阿毗至大泥犁耶中經九十九俱致百千劫在大泥犁耶中所有大泥犁耶苦皆具受已於六十三百千生中常得誹謗於三十三百千生中行出家已還退在俗以彼餘業障故於無垢焰如來應正遍知教中出家壽量既長於俱致百千歲如救頭然發勤修行猶未曾得隨順道忍復多百千生中暗鈍以彼餘業故善家子彼時説法比丘名淨善行汝莫異見何以故不動如來即是彼時説法比丘名淨善行善家子彼時説法比丘名善行意汝莫異見何以故我身即是彼時説法比丘名善行意我於彼所乃至微細方便於中不淨心生已作此業障墮大泥犁耶中善家子有如是微細業障善家子若有菩薩不欲如是業障者於第二菩薩所諸修行中不應違背諸作業中皆當信順應生如是心我不知他心衆生所行是亦難知善家子如來見是義故説如是法於富伽羅富伽羅所不應選擇唯我能選擇富伽羅及餘似我者善家子若欲自護不應選擇有所行者不於他所而作遮礙此如是相當於佛法勤作相應晝夜勤念與法相應善家子發行深心菩薩不應復於他所而作遮礙當勤隨順相應修行善家子假使三千大千世界衆生若有菩薩令彼安立十善業道若有菩薩獨到間處乃至一彈指頃信諸法一相道若問若共議若説若教誦若自誦此生福德過多於彼何以故善家子菩薩摩訶薩因此道故得淨業障諸衆生中遠離愛憎速到遍智
